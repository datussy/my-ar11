<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>
  <style> body { margin: 0; } </style>
</head>
<body>
  <!-- Thêm thuộc tính renderer để tối ưu tính toán chiều sâu (depth) -->
  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind;"
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true;">
    <a-assets>
      <a-asset-item id="model" src="./model6.glb"></a-asset-item>
    </a-assets>
    
    <!-- Thêm near="0.001" vào camera để cho phép hiển thị các vật thể ở cực gần -->
    <a-camera position="0 0 0" look-controls="enabled: false" near="0.001"></a-camera>
    
    <a-entity mindar-image-target="targetIndex: 0">
      <a-gltf-model
        src="#model"
        position="0 -0.3 0"
        scale="0.5 0.5 0.5"
        rotation="0 0 0"
        animation-mixer="clip: mixamo.com.003 Retarget.001; loop: repeat">
      </a-gltf-model>
    </a-entity>
  </a-scene>
</body>
</html>
